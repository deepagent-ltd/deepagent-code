<svg width="960" height="240" viewBox="0 0 960 240" fill="none"
     xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">DeepAgent Code</title>
  <desc id="d">DeepAgent Code wordmark for dark backgrounds</desc>
  <defs>
    <linearGradient id="dg" x1="65" y1="0" x2="103" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#2563EB"/>
      <stop offset="1"   stop-color="#1E40AF"/>
    </linearGradient>
  </defs>

  <rect width="960" height="240" rx="36" fill="#0B1020"/>

  <g transform="translate(58 42)">
    <rect width="156" height="156" rx="36" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="53" y1="37" x2="53" y2="119"
          stroke="#0284C7" stroke-width="12" stroke-linecap="butt"/>
    <path d="M71 43 H103 V113 H71"
          stroke="url(#dg)" stroke-width="12"
          stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
  </g>

  <text x="250" y="140" fill="#F8FAFC"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="60" font-weight="800" letter-spacing="-1.4">DeepAgent<tspan fill="#38BDF8" dx="18">Code</tspan></text>
</svg>
