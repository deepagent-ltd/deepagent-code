<svg width="960" height="240" viewBox="0 0 960 240" fill="none"
     xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">DeepAgent Code</title>
  <desc id="d">DeepAgent Code wordmark for light backgrounds</desc>
  <defs>
    <!-- userSpaceOnUse coordinates are in the group's local space (after translate) -->
    <linearGradient id="dg" x1="65" y1="0" x2="103" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#7DD3FC"/>
      <stop offset="0.5" stop-color="#3B82F6"/>
      <stop offset="1"   stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <rect width="960" height="240" rx="36" fill="#F8FAFC"/>

  <g transform="translate(58 42)">
    <rect width="156" height="156" rx="36" fill="#0F172A"/>
    <!-- left vertical fixed color, aligned to the right D's outer edges -->
    <line x1="53" y1="37" x2="53" y2="119"
          stroke="#38BDF8" stroke-width="12" stroke-linecap="butt"/>
    <!-- right three sides, short horizontals = slim centered D, ~6px gap to left stroke -->
    <path d="M71 43 H103 V113 H71"
          stroke="url(#dg)" stroke-width="12"
          stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
  </g>

  <text x="250" y="140" fill="#0F172A"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="60" font-weight="800" letter-spacing="-1.4">DeepAgent<tspan fill="#2563EB" dx="18">Code</tspan></text>
</svg>
