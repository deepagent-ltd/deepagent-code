name: deepagent-code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  deepagent-code:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /deepagent-code') ||
      startsWith(github.event.comment.body, '/deepagent-code')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: ./.github/actions/setup-bun

      - name: Run deepagent-code
        uses: lessweb/deepagent-code/github@2c14fc5586fe0b88e5c04732d2e846769cc35671 # latest
        env:
          DEEPAGENT_CODE_API_KEY: ${{ secrets.DEEPAGENT_CODE_API_KEY }}
          DEEPAGENT_CODE_PERMISSION: '{"bash": "deny"}'
        with:
          model: deepagent-code/claude-opus-4-5
